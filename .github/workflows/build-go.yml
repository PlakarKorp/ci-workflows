name: Build Go Package

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        required: false
        default: '1.23.3'
      target:
        type: string
        required: true
      test-option-timeout:
        type: string
        required: false
        default: '0'

jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: Build Target
      run: go build -v ${{ inputs.target }}

    - name: Run Unit Tests
      run: go test -v -vet=all --timeout ${{ inputs.test-option-timeout }} ${{ inputs.target }}
